<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isomer — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --bg:#0a0e17; --card:#1a2234; --border:#2a3650; --text:#e8ecf4; --muted:#5b6580; --accent:#38bdf8; }
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{width:380px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.5rem}
.logo{text-align:center;margin-bottom:2rem}
.logo svg{width:48px;height:48px;margin-bottom:0.5rem}
.logo h1{font-size:1.6rem;font-weight:700;letter-spacing:-0.03em}
.logo .ver{font-size:0.65rem;text-transform:uppercase;color:var(--accent);background:rgba(56,189,248,0.1);padding:2px 8px;border-radius:4px;letter-spacing:0.06em;margin-left:0.4rem}
.logo p{color:var(--muted);font-size:0.85rem;margin-top:0.3rem}
label{display:block;font-size:0.78rem;font-weight:600;color:#8b95a9;margin-bottom:0.3rem;text-transform:uppercase;letter-spacing:0.04em}
input{width:100%;padding:0.6rem 0.9rem;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:0.95rem;margin-bottom:1rem}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(56,189,248,0.12)}
button{width:100%;padding:0.7rem;background:var(--accent);color:#0a0e17;border:none;border-radius:8px;font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;transition:background 0.15s}
button:hover{background:#5cc9f9}
.flash{padding:0.6rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:0.85rem;background:rgba(248,113,113,0.12);color:#f87171;border:1px solid rgba(248,113,113,0.2)}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="28" height="28" rx="6" fill="#38bdf8" fill-opacity="0.15" stroke="#38bdf8" stroke-width="1.5"/>
      <path d="M10 10h4v12h-4z" fill="#38bdf8" opacity="0.6"/>
      <path d="M18 8h4v14h-4z" fill="#38bdf8"/>
      <path d="M8 22h16" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <h1>Isomer <span class="ver">Alpha</span></h1>
    <p>Compliance Tracking Platform</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}{% for cat, msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}{% endif %}
  {% endwith %}

  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label for="username">Username</label>
    <input type="text" name="username" id="username" required autofocus>
    <label for="password">Password</label>
    <input type="password" name="password" id="password" required>
    <button type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
