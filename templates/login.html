<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>isomer</title>
<script>
  (function () {
    try {
      var t = localStorage.getItem("zoleb-theme") || "dark";
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) {
      document.documentElement.setAttribute("data-theme", "dark");
    }
  })();
</script>
<style>
@font-face {
  font-family: "InterVariable";
  src: url("/static/InterVariable.ttf") format("truetype-variations"),
       url("/static/InterVariable.ttf") format("truetype");
  font-weight: 100 900;
  font-display: swap;
}
:root,
html[data-theme="dark"] {
  color-scheme: dark;
  --bg:          #272822;
  --card:        rgba(62, 61, 50, 0.6);
  --border:      rgba(248, 248, 242, 0.1);
  --text:        #f8f8f2;
  --muted:       #75715e;
  --accent:      #fd971f;
  --accent-dim:  #a66410;
  --accent-soft: rgba(253, 151, 31, 0.14);
  --red:         #f92672;
  --red-soft:    rgba(249, 38, 114, 0.14);
}
html[data-theme="light"] {
  color-scheme: light;
  --bg:          #fafafa;
  --card:        rgba(39, 40, 34, 0.04);
  --border:      rgba(39, 40, 34, 0.12);
  --text:        #272822;
  --muted:       #75715e;
  --accent:      #c24f0d;
  --accent-dim:  #8a3806;
  --accent-soft: rgba(194, 79, 13, 0.12);
  --red:         #c00e5a;
  --red-soft:    rgba(192, 14, 90, 0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family: "InterVariable", Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-feature-settings: "cv11", "ss01", "ss03";
  background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center
}
.theme-toggle{position:fixed;top:16px;right:16px;z-index:1000;font:inherit;color:var(--text);background:transparent;border:1px solid var(--border);border-radius:3px;padding:0.2rem 0.6rem;cursor:pointer}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
.login-box{width:380px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.5rem;backdrop-filter:blur(10px)}
.logo{text-align:center;margin-bottom:2rem;color:var(--accent)}
.logo svg{width:48px;height:48px;margin-bottom:0.5rem}
.logo h1{font-size:1.6rem;font-weight:700;letter-spacing:-0.03em;color:var(--text)}
.logo .ver{font-size:0.65rem;text-transform:uppercase;color:var(--accent);background:var(--accent-soft);padding:2px 8px;border-radius:4px;letter-spacing:0.06em;margin-left:0.4rem}
.logo p{color:var(--muted);font-size:0.85rem;margin-top:0.3rem}
label{display:block;font-size:0.78rem;font-weight:600;color:var(--muted);margin-bottom:0.3rem;text-transform:uppercase;letter-spacing:0.04em}
input{width:100%;padding:0.6rem 0.9rem;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:0.95rem;margin-bottom:1rem}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
button[type=submit]{width:100%;padding:0.7rem;background:var(--accent);color:var(--bg);border:none;border-radius:8px;font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;transition:background 0.15s}
button[type=submit]:hover{background:var(--accent-dim)}
.flash{padding:0.6rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:0.85rem;background:var(--red-soft);color:var(--red);border:1px solid var(--red-soft)}
</style>
</head>
<body>
<button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color theme">theme</button>
<div class="login-box">
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="28" height="28" rx="6" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-width="1.5"/>
      <path d="M10 10h4v12h-4z" fill="currentColor" opacity="0.6"/>
      <path d="M18 8h4v14h-4z" fill="currentColor"/>
      <path d="M8 22h16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <h1>Isomer <span class="ver">Alpha</span></h1>
    <p>Compliance Tracking Platform</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}{% for cat, msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}{% endif %}
  {% endwith %}

  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label for="username">Username</label>
    <input type="text" name="username" id="username" required autofocus>
    <label for="password">Password</label>
    <input type="password" name="password" id="password" required>
    <button type="submit">Sign In</button>
  </form>
</div>
<script>
(function () {
  const root = document.documentElement;
  const btn = document.getElementById("theme-toggle");
  if (!btn) return;
  function sync() {
    const dark = root.getAttribute("data-theme") !== "light";
    btn.textContent = dark ? "light mode" : "dark mode";
  }
  btn.addEventListener("click", function () {
    const next = root.getAttribute("data-theme") === "light" ? "dark" : "light";
    root.setAttribute("data-theme", next);
    try { localStorage.setItem("zoleb-theme", next); } catch (e) {}
    sync();
  });
  sync();
})();
</script>
</body>
</html>
