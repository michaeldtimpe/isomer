# nginx vhost for isomer.zoleb.com.
#
# Deploy:
#   sudo install -o root -g root -m 0644 deploy/isomer.zoleb.com.conf \
#     /etc/nginx/sites-available/isomer.zoleb.com.conf
#   sudo ln -sf /etc/nginx/sites-available/isomer.zoleb.com.conf \
#     /etc/nginx/sites-enabled/isomer.zoleb.com.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Assumes /etc/nginx/conf.d/hardening.conf defines the `general` limit_req
# zone (keyed on $http_cf_connecting_ip, 10r/s). Auth is handled inside the
# app (Flask session + per-user roles). This vhost terminates TLS, stamps
# the standard security headers, and proxies to the loopback-only container.

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name isomer.zoleb.com;

    ssl_certificate /etc/ssl/cloudflare/zoleb.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/zoleb.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    access_log /var/log/nginx/isomer.access.log;
    error_log /var/log/nginx/isomer.error.log;

    limit_req zone=general burst=20 nodelay;
    limit_req_status 429;

    # 50 MiB matches app.config['MAX_CONTENT_LENGTH'] so oversize uploads
    # are rejected at nginx rather than being streamed to the app.
    client_max_body_size 50M;

    # CSP keeps 'unsafe-inline' because templates (base.html, company_view,
    # control_view, settings, dashboard) carry inline <style> and small inline
    # <script> blocks. Tighten once those are externalized.
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'none'; form-action 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=(), bluetooth=(), interest-cohort=()" always;

    # /login gets a stricter rate than the general zone — brute force defense
    # in depth on top of the app's own per-username limiter.
    location = /login {
        limit_req zone=general burst=5 nodelay;
        proxy_pass http://127.0.0.1:27001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location / {
        proxy_pass http://127.0.0.1:27001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }
}
