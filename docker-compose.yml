version: '3.8'

services:
  isomer:
    build: .
    container_name: isomer
    # Loopback-only publish. The app has in-process auth but no TLS,
    # rate-limiting, or security headers — those belong on the nginx
    # reverse proxy in front of it. Publishing on 0.0.0.0 would let
    # any host-firewall-permitted client speak plaintext HTTP to Flask
    # and bypass the CSP/HSTS/nginx layer entirely.
    ports:
      - "127.0.0.1:27001:27001"
    volumes:
      - isomer_data:/data
    env_file:
      - .env
    environment:
      - ISOMER_DATA=/data
      - DATABASE_URL=postgres://user:password@db:5432/isomer
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped

  db:
    image: postgres:13
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=isomer
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2

volumes:
  isomer_data:
    driver: local
  db_data:
    driver: local